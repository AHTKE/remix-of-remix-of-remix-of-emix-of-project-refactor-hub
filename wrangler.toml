# ============================================================
# Cloudflare Workers configuration
# NOTE: This file is consumed only when you Export the project and
# deploy it to your own Cloudflare account (wrangler deploy).
# Lovable's managed preview/runtime ignores it.
#
# Before deploying:
#   1. wrangler kv namespace create AMW_KV
#   2. Paste the returned id below (or set it from
#      Admin → Settings → KV_NAMESPACE_ID then re-export).
# ============================================================

name = "amw-lms"
main = "src/server.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "AMW_KV"
id = "PLACEHOLDER_FOR_ID"
# preview_id = "PLACEHOLDER_FOR_PREVIEW_ID"
